name: Deploy to CloudBase Static Hosting

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci --include=optional
          npm install --no-save @tailwindcss/oxide-linux-x64-gnu@4.3.0

      - name: Build project
        run: npm run build

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login CloudBase CLI
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Deploy to CloudBase Static Hosting
        run: tcb hosting deploy ./dist /home -e ${{ secrets.TCB_ENV_ID }}
